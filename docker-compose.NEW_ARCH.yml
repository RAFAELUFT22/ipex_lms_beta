version: '3.8'

services:
  # Reverse Proxy & SSL
  traefik:
    image: traefik:v2.10
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./data/traefik:/letsencrypt"

  # TDS Backend API
  lms-api:
    image: ghcr.io/rafaeluft22/tds-lms-api:latest
    restart: always
    env_file: .env
    environment:
      - DB_FILE=/app/data/lms_lite_db.json
      - SETTINGS_FILE=/app/data/settings.json
    volumes:
      - "./data/backend:/app/data"
      - "./lms_lite_api.py:/app/lms_lite_api.py"
      - "./lms_lite_core.py:/app/lms_lite_core.py"
      - "./lms_lite_v2_routes.py:/app/lms_lite_v2_routes.py"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lms-api.rule=Host(`api-lms.${DOMAIN}`)"
      - "traefik.http.routers.lms-api.entrypoints=websecure"
      - "traefik.http.routers.lms-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.lms-api.loadbalancer.server.port=8081"

  # AnythingLLM (RAG Engine)
  anythingllm:
    image: mintplexlabs/anythingllm
    restart: always
    env_file: .env
    volumes:
      - "./data/anythingllm:/app/storage"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag.rule=Host(`rag.${DOMAIN}`)"
      - "traefik.http.routers.rag.entrypoints=websecure"
      - "traefik.http.routers.rag.tls.certresolver=letsencrypt"
      - "traefik.http.services.rag.loadbalancer.server.port=3001"

  # Evolution API (WhatsApp)
  evolution:
    image: atendai/evolution-api:latest
    restart: always
    env_file: .env
    volumes:
      - "./data/evolution:/evolution/instances"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evo.rule=Host(`evolution.${DOMAIN}`)"
      - "traefik.http.routers.evo.entrypoints=websecure"
      - "traefik.http.routers.evo.tls.certresolver=letsencrypt"
      - "traefik.http.services.evo.loadbalancer.server.port=8080"

  # Redis (Cache & Session)
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - "./data/redis:/data"

volumes:
  data:
