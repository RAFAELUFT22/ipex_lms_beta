<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Territórios de Desenvolvimento Social e Inclusão Produtiva</title>
    <script type="module" crossorigin src="/assets/lms/frontend/assets/index-9PaojE28.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/lms/frontend/assets/index-2cPoMQqg.css">
    <style>
        :root { --tds-navy: #2E4053; --tds-green: #8BC34A; --tds-yellow: #F7DC6F; }
        .bg-surface-menu-bar { background-color: #ffffff !important; border-right: 1px solid #edf2f7 !important; }
        .bg-surface-menu-bar span, .lucide, .bg-surface-menu-bar button { color: var(--tds-navy) !important; }
        .kreativ-hero {
            background: linear-gradient(135deg, var(--tds-navy) 0%, var(--tds-green) 100%) !important;
            padding: 60px 40px !important; color: white !important; border-radius: 0 0 40px 40px !important;
            margin-bottom: 30px !important; box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
        }
        .partner-row img { height: 35px; background: white; padding: 5px 10px; border-radius: 8px; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        {% for key in boot %} window["{{ key }}"] = {{ boot[key] | tojson }}; {% endfor %}
        const inject = () => {
            const main = document.querySelector('.p-5.pb-10');
            if (main && !document.getElementById('k-hero')) {
                const h = document.createElement('div');
                h.id = 'k-hero'; h.className = 'kreativ-hero';
                h.innerHTML = \`
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div><h1 style="font-weight:800; font-size:2rem; margin:0; color:white;">Portal de Desenvolvimento Social</h1><p style="color:white;opacity:0.9;">Inclusão Produtiva e Excelência.</p></div>
                        <img src="/files/logos_act/tds_main.png" style="height:80px;">
                    </div>
                    <div style="margin-top:20px;" class="partner-row">
                        <img src="/files/logos_act/ipex.png"><img src="/files/logos_act/uft.png"><img src="/files/logos_act/fapt.png">
                    </div>\`;
                main.prepend(h);
            }
        };
        new MutationObserver(inject).observe(document.body, { childList: true, subtree: true });
        setInterval(inject, 1000);
    </script>
</body>
</html>
