<!DOCTYPE html>
<html lang="pt-BR">
        <head>
                <meta charset="UTF-8" />
                <link rel="icon" href="{{ favicon }}" />
                <link rel="manifest" href="/api/method/lms.lms.api.get_pwa_manifest" />
                <meta name="viewport" content="width=device-width, initial-scale=1.0" />
                <title>{{ title }}</title>
                
                <!-- KREATIV CUSTOM FONTS -->
                <link rel="preconnect" href="https://fonts.googleapis.com">
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

                <script type="module" crossorigin src="/assets/lms/frontend/assets/index-9PaojE28.js"></script>
                <link rel="stylesheet" crossorigin href="/assets/lms/frontend/assets/index-2cPoMQqg.css">
                <link rel="stylesheet" href="/assets/kreativ_theme/css/lms_theme.css">
                
                <style>
                    /* KREATIV DESKTOP SIDEBAR (IMAGE 2) */
                    #kreativ-sidebar {
                        width: 100px;
                        background: #ffffff;
                        height: 100vh;
                        position: fixed;
                        left: 0;
                        top: 0;
                        border-right: 1px solid #edf2f7;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        padding: 30px 0;
                        z-index: 1000;
                        box-shadow: 4px 0 15px rgba(0,0,0,0.02);
                    }
                    
                    .nav-icon-box {
                        width: 50px;
                        height: 50px;
                        border-radius: 12px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        margin-bottom: 25px;
                        color: #718096;
                        transition: all 0.3s ease;
                        cursor: pointer;
                    }

                    .nav-icon-box:hover, .nav-icon-box.active {
                        background: #f0f7f7;
                        color: #008080;
                    }

                    #app-container {
                        margin-left: 100px;
                        background: #f8fafc;
                        min-height: 100vh;
                    }

                    @media (max-width: 768px) {
                        #kreativ-sidebar { display: none; }
                        #app-container { margin-left: 0 !important; }
                    }
                </style>
        </head>
        <body class="sm:overscroll-y-none no-scrollbar">
                <!-- CUSTOM SIDEBAR -->
                <div id="kreativ-sidebar">
                    <img src="/files/logo_tds_oficial.png" style="width: 50px; margin-bottom: 50px;">
                    
                    <div class="nav-icon-box active">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                    </div>
                    <div class="nav-icon-box">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    </div>
                    <div class="nav-icon-box">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <div class="nav-icon-box">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z"/></svg>
                    </div>

                    <div style="margin-top: auto; padding-bottom: 20px;">
                        <div class="nav-icon-box">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                        </div>
                    </div>
                </div>

                <div id="app-container">
                    <div id="app"></div>
                </div>

                <script>
                  {% for key in boot %}
                  window["{{ key }}"] = {{ boot[key] | tojson }};
                  {% endfor %}
                </script>
          </body>
</html>
