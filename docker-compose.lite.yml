version: '3.8'

services:
  lms-lite-api:
    image: ghcr.io/rafaeluft22/tds-lms-api:latest
    restart: always
    environment:
      - DB_FILE=/data/lms_lite_db.json
      - SETTINGS_FILE=/data/settings.json
      - CERT_SALT=${CERT_SALT:-TDS_SECRET_2026}
      - ADMIN_KEY=${ADMIN_KEY:-admin-tds-2026}
      - VALIDATION_BASE_URL=https://ops.ipexdesenvolvimento.cloud
    volumes:
      - tds_data:/data
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-lms.rule=Host(`api-lms.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.api-lms.entrypoints=websecure"
      - "traefik.http.routers.api-lms.tls=true"
      - "traefik.http.routers.api-lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.api-lms.loadbalancer.server.port=8081"
      - "traefik.docker.network=dokploy-network"

  lms-lite-dashboard:
    image: ghcr.io/rafaeluft22/tds-lms-dashboard:latest
    restart: always
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ops-tds.rule=Host(`ops.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.ops-tds.entrypoints=websecure"
      - "traefik.http.routers.ops-tds.tls=true"
      - "traefik.http.routers.ops-tds.tls.certresolver=letsencrypt"
      - "traefik.http.services.ops-tds.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

volumes:
  tds_data:
    name: tds_persistent_data

networks:
  dokploy-network:
    external: true
