# =============================================================================
# Kreativ Education — Frappe LMS Stack Completo
#
# REQUISITOS MÍNIMOS:
#   - 4 vCPU, 8GB RAM, 80GB SSD
#   - Docker Engine 24+ com Compose V2
#   - Traefik configurado na rede 'coolify'
#
# DEPLOY:
#   1. cp .env.example .env  (preencha as senhas)
#   2. bash scripts/setup.sh
#   3. docker compose -f docker/docker-compose.yml up -d
# =============================================================================

networks:
  kreativ_net:
    name: kreativ_education_net
    driver: bridge
  coolify:
    name: coolify
    external: true

volumes:
  frappe_mariadb_data:
  frappe_sites_data:
  frappe_logs_data:
  frappe_assets_data:


services:

  # ---------------------------------------------------------------------------
  # BANCO DE DADOS: MariaDB 10.6
  # ---------------------------------------------------------------------------
  frappe_mariadb:
    image: mariadb:10.6
    container_name: kreativ_frappe_mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: frappe_kreativ
      MYSQL_USER: frappe
      MYSQL_PASSWORD: ${MARIADB_FRAPPE_PASSWORD}
    volumes:
      - frappe_mariadb_data:/var/lib/mysql
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # FRAPPE LMS — Backend (Gunicorn)
  # ⚠️ 4GB RAM obrigatório para bench build (vite compila 3885 módulos)
  # ---------------------------------------------------------------------------
  frappe_backend:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_backend
    restart: unless-stopped
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    environment:
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME:-lms.extensionista.site}
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      frappe_mariadb:
        condition: service_healthy
      frappe_redis_queue:
        condition: service_started

  # ---------------------------------------------------------------------------
  # FRAPPE — Frontend (Nginx)
  # ---------------------------------------------------------------------------
  frappe_frontend:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_frontend
    restart: unless-stopped
    entrypoint:
      - bash
      - -c
    command:
      - /usr/local/bin/nginx-entrypoint.sh
    environment:
      BACKEND: frappe_backend:8000
      SOCKETIO: frappe_socketio:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME:-lms.extensionista.site}
      UPSTREAM_REAL_IP_ADDRESS: "127.0.0.1"
      UPSTREAM_REAL_IP_HEADER: "X-Forwarded-For"
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    networks:
      - kreativ_net
      - coolify
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.kreativ-lms.rule=Host(`lms.${DOMAIN:-extensionista.site}`)"
      - "traefik.http.routers.kreativ-lms.entrypoints=https"
      - "traefik.http.routers.kreativ-lms.tls=true"
      - "traefik.http.routers.kreativ-lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-lms.loadbalancer.server.port=8080"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.kreativ-lms-http.rule=Host(`lms.${DOMAIN:-extensionista.site}`)"
      - "traefik.http.routers.kreativ-lms-http.entrypoints=http"
      - "traefik.http.routers.kreativ-lms-http.middlewares=kreativ-https-redirect"
      - "traefik.docker.network=coolify"
    depends_on:
      - frappe_backend

  # ---------------------------------------------------------------------------
  # FRAPPE — SocketIO (WebSocket real-time)
  # ---------------------------------------------------------------------------
  frappe_socketio:
    image: frappe/frappe-socketio:latest
    container_name: kreativ_frappe_socketio
    restart: unless-stopped
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - frappe_backend
      - frappe_redis_socketio

  # ---------------------------------------------------------------------------
  # FRAPPE — Workers (background jobs)
  # ---------------------------------------------------------------------------
  frappe_queue_short:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_queue_short
    restart: unless-stopped
    command: bench worker --queue short,default
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      frappe_mariadb:
        condition: service_healthy
      frappe_redis_queue:
        condition: service_started

  frappe_queue_long:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_queue_long
    restart: unless-stopped
    command: bench worker --queue long,default,short
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      frappe_mariadb:
        condition: service_healthy
      frappe_redis_queue:
        condition: service_started

  # ---------------------------------------------------------------------------
  # FRAPPE — Scheduler (cron jobs internos)
  # ---------------------------------------------------------------------------
  frappe_scheduler:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_scheduler
    restart: unless-stopped
    command: bench schedule
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      frappe_mariadb:
        condition: service_healthy
      frappe_redis_queue:
        condition: service_started

  # ---------------------------------------------------------------------------
  # REDIS — Filas e SocketIO
  # ---------------------------------------------------------------------------
  frappe_redis_queue:
    image: redis:7-alpine
    container_name: kreativ_frappe_redis_queue
    restart: unless-stopped
    volumes:
      - ./redis-queue.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 64M

  frappe_redis_socketio:
    image: redis:7-alpine
    container_name: kreativ_frappe_redis_socketio
    restart: unless-stopped
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # CONFIGURADOR — Job de inicialização (roda uma vez)
  # ---------------------------------------------------------------------------
  frappe_configurator:
    image: kreativ_frappe_lms:latest
    container_name: kreativ_frappe_configurator
    restart: "no"
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt; bench set-config -g db_host $$DB_HOST; bench set-config -gp db_port $$DB_PORT; bench set-config -g redis_cache "redis://$$REDIS_CACHE"; bench set-config -g redis_queue "redis://$$REDIS_QUEUE"; bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO"; bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: kreativ_frappe_mariadb
      DB_PORT: "3306"
      REDIS_CACHE: kreativ_frappe_redis_socketio:6379/0
      REDIS_QUEUE: kreativ_frappe_redis_queue:6379/0
      REDIS_SOCKETIO: kreativ_frappe_redis_socketio:6379/1
      SOCKETIO_PORT: "9000"
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      frappe_mariadb:
        condition: service_healthy
