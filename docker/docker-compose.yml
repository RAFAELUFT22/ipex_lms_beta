# =============================================================================
# TDS (Território de Desenvolvimento Social) — Consolidated 5-Pillar Architecture
# Stack: Evolution (Gateway) | n8n (Orchestrator) | AnythingLLM (RAG) | Frappe (LMS) | Chatwoot (Human Inbox)
# Managed via Dokploy/Traefik
# =============================================================================

version: '3.8'

networks:
  kreativ_net:
    name: kreativ_education_net
    driver: bridge
  dokploy-network:
    name: dokploy-network
    external: true

volumes:
  frappe_mariadb_data:
  frappe_sites_data:
  frappe_logs_data:
  frappe_assets_data:
  postgres_data:
  anythingllm_storage:
  n8n_data:
  evolution_data:
  minio_data:
  mail_data:
  mail_state:
  mail_config:
  lms_lite_data:

services:

  # ---------------------------------------------------------------------------
  # SHARED DATABASES
  # ---------------------------------------------------------------------------

  postgres:
    image: pgvector/pgvector:pg16
    container_name: kreativ-postgres
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-kreativ}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE:-kreativ_edu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - kreativ_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-kreativ}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mariadb:
    image: mariadb:10.6
    container_name: kreativ-mariadb
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --max_allowed_packet=256M
      - --innodb_buffer_pool_size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: frappe_kreativ
      MYSQL_USER: frappe
      MYSQL_PASSWORD: ${MARIADB_FRAPPE_PASSWORD}
    volumes:
      - frappe_mariadb_data:/var/lib/mysql
    networks:
      - kreativ_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kreativ-redis
    restart: always
    volumes:
      - ./redis-queue.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    networks:
      - kreativ_net

  # ---------------------------------------------------------------------------
  # FRAPPE LMS (Learning Management System)
  # ---------------------------------------------------------------------------

  frappe_backend:
    image: tds-frappe-custom:latest
    container_name: kreativ-frappe-backend
    restart: unless-stopped
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_logs_data:/home/frappe/frappe-bench/logs
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    environment:
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME:-lms.ipexdesenvolvimento.cloud}
    networks:
      - kreativ_net
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  frappe_frontend:
    image: tds-frappe-custom:latest
    container_name: kreativ-frappe-frontend
    restart: unless-stopped
    command: /usr/local/bin/nginx-entrypoint.sh
    environment:
      BACKEND: frappe_backend:8000
      SOCKETIO: frappe_socketio:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME:-lms.ipexdesenvolvimento.cloud}
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
      - frappe_assets_data:/home/frappe/frappe-bench/sites/assets
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-lms.rule=Host(`lms.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-lms.entrypoints=websecure"
      - "traefik.http.routers.kreativ-lms.tls=true"
      - "traefik.http.routers.kreativ-lms.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-lms.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      - frappe_backend

  frappe_socketio:
    image: frappe/frappe-socketio:latest
    container_name: kreativ-frappe-socketio
    restart: always
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - frappe_backend

  frappe_worker:
    image: tds-frappe-custom:latest
    container_name: kreativ-frappe-worker
    restart: unless-stopped
    command: bench worker --queue default,short,long
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - frappe_backend

  frappe_scheduler:
    image: tds-frappe-custom:latest
    container_name: kreativ-frappe-scheduler
    restart: unless-stopped
    command: bench schedule
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      - frappe_backend

  frappe_configurator:
    image: tds-frappe-custom:latest
    container_name: kreativ-frappe-configurator
    restart: "no"
    command:
      - bash
      - -c
      - >
        ls -1 apps > sites/apps.txt; 
        bench set-config -g db_host mariadb; 
        bench set-config -gp db_port 3306; 
        bench set-config -g redis_cache "redis://:$REDIS_PASSWORD@redis:6379/0"; 
        bench set-config -g redis_queue "redis://:$REDIS_PASSWORD@redis:6379/1"; 
        bench set-config -g redis_socketio "redis://:$REDIS_PASSWORD@redis:6379/2"; 
        bench set-config -gp socketio_port 9000;
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - frappe_sites_data:/home/frappe/frappe-bench/sites
    networks:
      - kreativ_net
    depends_on:
      mariadb:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # WHATSAPP GATEWAY (Evolution API)
  # ---------------------------------------------------------------------------

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: kreativ-evolution
    restart: always
    environment:
      SERVER_PORT: 8080
      SERVER_URL: https://evolution.ipexdesenvolvimento.cloud
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${PG_USER:-kreativ}:${PG_PASSWORD}@postgres:5432/${EVOLUTION_DB:-evolution_db}
      # NATIVE INTEGRATION: Chatwoot & n8n Webhook
      CHATWOOT_ENABLED: "true"
      CHATWOOT_BOT_CONTACT: "true"
      CHATWOOT_MESSAGE_READ: "true"
      CHATWOOT_URL: http://chatwoot:3005
      WEBHOOK_GLOBAL_URL: https://n8n.ipexdesenvolvimento.cloud/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      REDIS_ENABLED: "false"
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - kreativ_net
      - dokploy-network
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-evolution.rule=Host(`evolution.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-evolution.entrypoints=websecure"
      - "traefik.http.routers.kreativ-evolution.tls=true"
      - "traefik.http.routers.kreativ-evolution.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-evolution.loadbalancer.server.port=8080"
      - "traefik.docker.network=dokploy-network"

  # ---------------------------------------------------------------------------
  # ORCHESTRATOR (n8n)
  # ---------------------------------------------------------------------------

  n8n:
    image: n8nio/n8n:latest
    container_name: kreativ-n8n
    restart: always
    environment:
      N8N_HOST: n8n.ipexdesenvolvimento.cloud
      WEBHOOK_URL: https://n8n.ipexdesenvolvimento.cloud
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${PG_DATABASE:-kreativ_edu}
      DB_POSTGRESDB_USER: ${PG_USER:-kreativ}
      DB_POSTGRESDB_PASSWORD: ${PG_PASSWORD}
      N8N_ENCRYPTION_KEY: tds_n8n_secret_000
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - kreativ_net
      - dokploy-network
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-n8n.rule=Host(`n8n.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-n8n.entrypoints=websecure"
      - "traefik.http.routers.kreativ-n8n.tls=true"
      - "traefik.http.routers.kreativ-n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-n8n.loadbalancer.server.port=5678"
      - "traefik.docker.network=dokploy-network"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  # ---------------------------------------------------------------------------
  # COGNITIVE TUTOR / RAG (AnythingLLM)
  # ---------------------------------------------------------------------------

  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: kreativ-rag
    restart: always
    environment:
      PORT: 3001
      STORAGE_DIR: /app/server/storage
      DISABLE_TELEMETRY: "true"
      LLM_PROVIDER: gemini
      GEMINI_LLM_MODEL_PREF: gemini-1.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - anythingllm_storage:/app/server/storage
    networks:
      - kreativ_net
      - dokploy-network

  # ---------------------------------------------------------------------------
  # HUMAN INBOX (Chatwoot)
  # ---------------------------------------------------------------------------

  chatwoot:
    image: chatwoot/chatwoot:v4.11.0
    container_name: kreativ-chatwoot
    restart: always
    command: sh -c "rm -f /app/tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rails s -p 3005 -b 0.0.0.0"
    environment: &chatwoot_env
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY}
      FRONTEND_URL: https://chat.ipexdesenvolvimento.cloud
      DEFAULT_LOCALE: pt_BR
      FORCE_SSL: "false"
      REDIS_URL: redis://:$REDIS_PASSWORD@redis:6379/3
      POSTGRES_HOST: postgres
      POSTGRES_RECONNECT: "true"
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: chatwoot_db
      POSTGRES_USERNAME: ${PG_USER:-kreativ}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PORT: 3005
      ACTIVE_STORAGE_SERVICE: local
      INSTALLATION_ENV: docker
      CW_AI_ENABLED: "true"
      INSTALLATION_NAME: KreativEdu
      MAILER_SENDER_EMAIL: noreply@ipexdesenvolvimento.cloud
      SMTP_ADDRESS: posteio
      SMTP_PORT: "587"
      SMTP_USERNAME: atendimento@ipexdesenvolvimento.cloud
      SMTP_PASSWORD: Admin@TDS2024
      SMTP_AUTHENTICATION: plain
      SMTP_ENABLE_STARTTLS_AUTO: "true"
      SMTP_OPENSSL_VERIFY_MODE: none
    networks:
      - kreativ_net
      - dokploy-network
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-chatwoot.rule=Host(`chat.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-chatwoot.entrypoints=websecure"
      - "traefik.http.routers.kreativ-chatwoot.tls=true"
      - "traefik.http.routers.kreativ-chatwoot.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-chatwoot.loadbalancer.server.port=3005"
      - "traefik.docker.network=dokploy-network"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3005/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  chatwoot_sidekiq:
    image: chatwoot/chatwoot:v4.11.0
    container_name: kreativ-chatwoot-sidekiq
    restart: always
    command: sh -c "bundle exec rails db:prepare && bundle exec sidekiq -C config/sidekiq.yml"
    environment: *chatwoot_env
    networks:
      - kreativ_net
    depends_on:
      - postgres

  # ---------------------------------------------------------------------------
  # EMAIL INFRASTRUCTURE (Full Server + Webmail)
  # ---------------------------------------------------------------------------

  mailserver:
    image: docker.io/mailserver/docker-mailserver:latest
    container_name: kreativ-mailserver
    hostname: mail
    domainname: ipexdesenvolvimento.cloud
    restart: always
    ports:
      - "25:25"    # SMTP
      - "587:587"  # Submission
      - "993:993"  # IMAPS
    environment:
      - OVERTAKE_IPEX_DOMAINS=1
      - ENABLE_SPAMASSASSIN=1
      - ENABLE_CLAMAV=0 # Desativado para economizar RAM, ative se necessário
      - ENABLE_FAIL2BAN=1
      - ENABLE_POSTGRE_AUTH=0
      - ONE_DIR=1
      - DMS_DEBUG=0
    volumes:
      - mail_data:/var/mail
      - mail_state:/var/mail-state
      - mail_config:/tmp/docker-mailserver
      - /etc/localtime:/etc/localtime:ro
    networks:
      - kreativ_net
      - dokploy-network

  webmail:
    image: djmaze/snappymail:latest
    container_name: kreativ-webmail
    restart: always
    networks:
      - kreativ_net
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-webmail.rule=Host(`webmail.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-webmail.entrypoints=websecure"
      - "traefik.http.routers.kreativ-webmail.tls=true"
      - "traefik.http.routers.kreativ-webmail.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-webmail.loadbalancer.server.port=8888"
    depends_on:
      - mailserver

  # ---------------------------------------------------------------------------
  # TDS OPS DASHBOARD (React + Nginx)
  # ---------------------------------------------------------------------------

  tds-ops:
    build:
      context: ../dashboard-tds
      dockerfile: Dockerfile
      args:
        VITE_ADMIN_KEY: ${ADMIN_KEY}
        VITE_LMS_API_URL: ${VITE_LMS_API_URL:-https://api-lms.ipexdesenvolvimento.cloud}
    container_name: kreativ-tds-ops
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-tds-ops.rule=Host(`ops.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-tds-ops.entrypoints=websecure"
      - "traefik.http.routers.kreativ-tds-ops.tls=true"
      - "traefik.http.routers.kreativ-tds-ops.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-tds-ops.loadbalancer.server.port=80"
      - "traefik.docker.network=dokploy-network"

  # ---------------------------------------------------------------------------
  # LMS LITE API (FastAPI — Python)
  # ---------------------------------------------------------------------------

  lms-lite-api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    container_name: kreativ-lms-lite-api
    restart: unless-stopped
    environment:
      ADMIN_KEY: ${ADMIN_KEY}
      CERT_SALT: ${CERT_SALT:-TDS_SECRET_2026}
      DB_FILE: /app/lms_lite_db.json
      SETTINGS_FILE: /app/settings.json
      GOOGLE_SERVICE_ACCOUNT_PATH: /app/google-service-account.json
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dashboard.ipexdesenvolvimento.cloud,https://ops.ipexdesenvolvimento.cloud}
    volumes:
      - lms_lite_data:/app
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kreativ-lms-api.rule=Host(`api-lms.ipexdesenvolvimento.cloud`)"
      - "traefik.http.routers.kreativ-lms-api.entrypoints=websecure"
      - "traefik.http.routers.kreativ-lms-api.tls=true"
      - "traefik.http.routers.kreativ-lms-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.kreativ-lms-api.loadbalancer.server.port=8081"
      - "traefik.docker.network=dokploy-network"

# GitOps Trigger Test
